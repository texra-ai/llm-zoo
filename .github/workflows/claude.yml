name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: bot-respond-${{ github.event.issue.number || github.event.pull_request.number || github.event.comment.id }}
  cancel-in-progress: false

jobs:
  claude:
    # Repository variable kill switch:
    #   CLAUDE_CODE_ENABLED=false disables mention-driven Claude runs.
    #   unset or any other value preserves the default enabled behavior.
    # Only OWNER / MEMBER / COLLABORATOR mentions of @claude trigger a run.
    if: |
      vars.CLAUDE_CODE_ENABLED != 'false' &&
      github.event.sender.type != 'Bot' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth (Claude subscription) — same secret as the review + updater workflows.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Repo conventions come from CLAUDE.md, which the action loads automatically.
          # The action reads the @claude mention itself; no prompt needed here.
          claude_args: |
            --model ${{ vars.CLAUDE_OPUS_MODEL || 'opus' }}
            --allowedTools "Read,Edit,Write,Glob,Grep,WebSearch,WebFetch,Bash(npm ci),Bash(npm install),Bash(npm run build),Bash(npm run typecheck),Bash(node *),Bash(git diff:*),Bash(git status),Bash(gh pr:*),Bash(gh issue:*)"

      - name: Report quota / rate-limit errors
        if: |
          steps.claude.outcome != 'success' &&
          (github.event_name == 'issues' ||
           (github.event_name == 'issue_comment' && !github.event.issue.pull_request) ||
           github.event_name == 'pull_request_review_comment' ||
           github.event_name == 'pull_request_review')
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            if (!issue_number) return;
            await github.rest.issues.createComment({
              issue_number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⏳ Claude ran into a quota or rate limit. Will retry on the next interaction.\n\n(See [action logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details)'
            });
