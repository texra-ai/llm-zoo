name: Release on version bump

# Closes the loop after a PR merges `package.json` with a new version (e.g. the
# daily model updater, or a manual PR): cuts the GitHub Release automatically,
# which in turn triggers publish.yml (on: release: published) to publish to
# npm, which homebrew-tap/nix then pick up on their next daily cron. No manual
# `gh release create` step required anymore.

on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  actions: write
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check whether the current version already has a release
        id: check
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists — no version bump to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${VERSION} — releasing ${TAG}."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "${{ steps.check.outputs.tag }}" \
            --title "${{ steps.check.outputs.tag }}" \
            --generate-notes

      - name: Dispatch npm publish
        if: steps.check.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run publish.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f tag="${{ steps.check.outputs.tag }}"
