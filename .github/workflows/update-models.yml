name: Daily model update

# Researches newly-released LLMs every day and opens a PR adding any that the
# registry is missing. Powered by Claude Code (anthropics/claude-code-action),
# which has WebSearch / WebFetch for research and the gh CLI for PR creation.
#
# Requirements:
#   - Repo secret CLAUDE_CODE_OAUTH_TOKEN — a Claude subscription OAuth token
#     (generate locally with `claude setup-token`). Same secret the texra repos
#     use; no metered Anthropic API key needed.
#   - "Allow GitHub Actions to create and approve pull requests" enabled in
#     Settings > Actions > General (needed for the workflow GITHUB_TOKEN to open PRs).

on:
  schedule:
    # 08:00 UTC daily. GitHub may delay scheduled runs under load.
    - cron: '0 8 * * *'
  # Allow manual runs from the Actions tab for testing.
  workflow_dispatch:

# Avoid overlapping runs piling up duplicate PRs.
concurrency:
  group: daily-model-update
  cancel-in-progress: false

jobs:
  update-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Load prompt
        id: load_prompt
        run: |
          set -euo pipefail
          {
            echo 'prompt<<PROMPT_EOF'
            cat .github/prompts/update-models.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Research and add new models
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth (Claude subscription) instead of a metered API key.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          base_branch: main
          claude_args: |
            --model sonnet
            --max-turns 40
            --allowedTools "WebSearch,WebFetch,Bash,Read,Edit,Write,Glob,Grep"
          prompt: ${{ steps.load_prompt.outputs.prompt }}
