name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Repository variable kill switch:
    #   CLAUDE_REVIEW_ENABLED=false disables Claude-powered PR review.
    #   unset or any other value preserves the default enabled behavior.
    if: vars.CLAUDE_REVIEW_ENABLED != 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    outputs:
      verdict: ${{ steps.verdict.outputs.verdict }}

    steps:
      - name: Checkout repository under review
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Load prompt
        id: load_prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo 'prompt<<PROMPT_EOF'
            echo "Review PR #${PR_NUMBER} in ${REPOSITORY}."
            echo
            cat .github/prompts/review.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        id: claude-review
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          # OAuth (Claude subscription) — same secret as the bot + updater workflows.
          # If the secret is unset the action fails this step cleanly (continue-on-error).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Repo conventions come from CLAUDE.md, loaded automatically by the action.
          prompt: ${{ steps.load_prompt.outputs.prompt }}
          claude_args: |
            --model ${{ vars.CLAUDE_OPUS_MODEL || 'opus' }}
            --allowedTools "Read,Glob,Grep,Write,WebSearch,WebFetch,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),mcp__github_inline_comment__create_inline_comment,mcp__github__*"

      - name: Report quota / rate-limit errors
        if: steps.claude-review.outcome == 'failure' || steps.claude-review.outcome == 'cancelled'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⏳ Claude quota exhausted or rate limit reached. Code review will be retried on the next push.\n\n(If this persists, check the [action logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))'
            });

      - name: Post review verdict as a commit status
        id: verdict
        if: steps.claude-review.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERDICT="REQUEST_CHANGES"
          if [ -f review-verdict.txt ] && grep -qx "APPROVE" review-verdict.txt; then
            VERDICT="APPROVE"
          fi
          echo "verdict=${VERDICT}" >> "$GITHUB_OUTPUT"
          SHA="${{ github.event.pull_request.head.sha }}"
          if [ "$VERDICT" = "APPROVE" ]; then
            STATE="success"
            DESC="No blocking data-accuracy or consistency issues found."
          else
            STATE="failure"
            DESC="Blocking issues found — see PR comments."
          fi
          gh api "repos/${{ github.repository }}/statuses/${SHA}" \
            -f state="$STATE" -f context="claude-review" -f description="$DESC"

  auto-fix-review:
    needs: claude-review
    if: |
      needs.claude-review.outputs.verdict == 'REQUEST_CHANGES' &&
      startsWith(github.event.pull_request.head.ref, 'auto/model-update-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 20
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Cap consecutive bot-fix iterations
        id: guard
        run: |
          set -euo pipefail
          MAX=5
          COUNT=0
          while IFS= read -r MSG; do
            if echo "$MSG" | grep -qE '^\[claude-review-fix\]'; then
              COUNT=$((COUNT + 1))
            else
              break
            fi
          done < <(git log --pretty=%s -n "$MAX")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -ge "$MAX" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Reached max bot-fix iterations ($MAX) on this PR. Needs a human now."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load prompt
        id: load_prompt
        if: steps.guard.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          BODY=$(sed \
            -e "s|<REPOSITORY>|${REPOSITORY}|g" \
            -e "s|<PR_NUMBER>|${PR_NUMBER}|g" \
            -e "s|<HEAD_BRANCH>|${HEAD_BRANCH}|g" \
            .github/prompts/auto-fix-review.md)
          {
            echo 'prompt<<PROMPT_EOF'
            printf '%s\n' "$BODY"
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Address review feedback
        if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.load_prompt.outputs.prompt }}
          claude_args: |
            --model ${{ vars.CLAUDE_OPUS_MODEL || 'opus' }}
            --allowedTools "Read,Edit,Write,Glob,Grep,WebSearch,WebFetch,Bash(gh api:*),Bash(gh pr comment:*),Bash(npm run typecheck),Bash(npm run build),Bash(git add:*),Bash(git commit:*),Bash(git push:*)"
